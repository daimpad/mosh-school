  <!-- Thema vor dem ersten Anstrich setzen (kein Flackern): liest die
       gespeicherte Einstellung und erzwingt hell/dunkel; 'auto' folgt dem OS.
       Muss inline und synchron laufen, da Module verzögert geladen werden. -->
  <script>
    (function () {
      try {
        var z = JSON.parse(localStorage.getItem('crossminton.zustand.v1') || '{}');
        var thema = z && z.einstellungen && z.einstellungen.thema;
        if (thema === 'hell' || thema === 'dunkel') document.documentElement.dataset.theme = thema;
        var dunkel = thema === 'dunkel' || (thema !== 'hell' && window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dunkel ? '#0f151c' : '#f5f9fd');
      } catch (e) {}
    })();
  </script>

  <!-- Auffangnetz ohne Module: Scheitert das Laden der ES-Module (Netz-/Cache-
       Störung, sehr alter Browser), bleibt keine leere Seite zurück. WICHTIG:
       geduldig prüfen statt hart nach 3 s abbrechen — Firefox ohne
       modulepreload (< 115) lädt den Modul-Graphen im langsameren Import-
       Wasserfall und braucht mit den JSON-Daten spürbar länger als Chrome.
       Wir pollen daher ~12 s (alle 400 ms); erst dann EIN automatischer
       Neuversuch (über sessionStorage gegen Endlosschleifen gesichert), und
       erst wenn auch der leer bleibt, erscheint die Meldung. So schlägt ein
       nur langsamer Ladevorgang nicht mehr fälschlich fehl. -->
  <script>
    (function () {
      var MAX = 30; // 30 × 400 ms ≈ 12 s Geduld, bevor aufgegeben wird
      var ersterFehler = '';
      function merke(text) { if (!ersterFehler && text) ersterFehler = String(text); }
      // Modul-LADEfehler blubbern nicht — im Capture eingefangen (z. B. von einer
      // Erweiterung/Firewall blockiertes <script>, falscher MIME-Typ, 404).
      window.addEventListener('error', function (e) {
        if (e && e.target && e.target.nodeName === 'SCRIPT' && e.target.src) {
          merke('Skript blockiert oder nicht ladbar: ' + e.target.src);
        } else if (e && e.message) {
          merke(e.message + (e.filename ? ' (' + e.filename + ':' + e.lineno + ')' : ''));
        }
      }, true);
      // LAUFZEITfehler beim Booten (boot() ist async → Ablehnung).
      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        merke(r && r.message ? r.message : r);
      });
      function esc(s) { return String(s).replace(/[<>&]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]; }); }
      function geladen() {
        var ziel = document.getElementById('ansicht');
        return ziel && ziel.childElementCount > 0;
      }
      function pruefe(versuch) {
        if (geladen()) {
          try { sessionStorage.removeItem('modul-neuversuch'); } catch (e) {}
          return;
        }
        if (versuch < MAX) {
          window.setTimeout(function () { pruefe(versuch + 1); }, 400);
          return;
        }
        // Nur ohne konkreten Fehler EINMAL neu laden (echte Netz-/Cache-Aussetzer);
        // steht ein Fehler fest, sofort zeigen — ein Reload würde nichts ändern.
        try {
          if (!ersterFehler && !sessionStorage.getItem('modul-neuversuch')) {
            sessionStorage.setItem('modul-neuversuch', '1');
            window.location.reload();
            return;
          }
        } catch (e) {}
        var ziel = document.getElementById('ansicht');
        if (ziel) ziel.innerHTML =
          '<div class="karte">' +
          '<h1>Die App konnte nicht vollständig geladen werden</h1>' +
          '<p class="leise">Beim Laden der Skript-Module ist etwas schiefgegangen — häufig eine Browser-Erweiterung, die Skripte blockiert, oder eine kurze Netzwerk-/Cache-Störung. Ein Neuladen oder ein privates Fenster (ohne Erweiterungen) hilft in der Regel.</p>' +
          (ersterFehler ? '<p class="leise">Technischer Hinweis: <code>' + esc(ersterFehler) + '</code></p>' : '') +
          '<button class="knopf knopf-primaer" onclick="window.location.reload()">Neu laden</button>' +
          '</div>';
      }
      window.addEventListener('load', function () { pruefe(0); });
    })();
  </script>
